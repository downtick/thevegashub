<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0010"/>
      <stop offset="1" stop-color="#2a0040"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#g)"/>
  <text x="32" y="45" text-anchor="middle" font-family="'Bebas Neue','Oswald',Arial,sans-serif" font-weight="700" font-size="38" fill="#00eaff" filter="url(#glow)" letter-spacing="1">VH</text>
</svg>
